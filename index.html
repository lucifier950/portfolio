<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: how search engines & link previews see your site -->
    <title>Advik Rajvansh | CSE Student & Developer</title>
    <meta
      name="description"
      content="Portfolio of Advik Rajvansh, a Computer Science Engineering student skilled in Python, C++, Machine Learning, React and Flask."
    />
    <meta name="author" content="Advik Rajvansh" />

    <!-- Open Graph: controls the preview card when shared on LinkedIn/WhatsApp -->
    <meta property="og:title" content="Advik Rajvansh | Portfolio" />
    <meta property="og:description" content="CSE student & developer building ML and full-stack projects." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <!-- React will "inject" the entire website inside this single empty div -->
    <div id="root"></div>

    <!-- This script is the entry point that boots our React app -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
